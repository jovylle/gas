name: Update fuel data

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-fuel-data
  cancel-in-progress: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch fuel data, history, and Iran-war deltas
        run: node scripts/fetch-fuel.mjs

      - name: Fetch FX rates (USD base)
        run: node scripts/fetch-fx.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fuel.json data/latest.json data/history.json data/war_deltas.json data/fx.json
          if git diff --staged --quiet; then
            echo "No data file changes"
          else
            git commit -m "chore(data): refresh fuel snapshots and war deltas"
            git push
          fi
