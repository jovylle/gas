name: Update fuel data

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-fuel-data
  cancel-in-progress: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and write data/fuel.json
        run: node scripts/fetch-fuel.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fuel.json
          if git diff --staged --quiet; then
            echo "No changes to fuel.json"
          else
            git commit -m "chore(data): refresh fuel prices from OpenVan API"
            git push
          fi
